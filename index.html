<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="build-version" content="2026-06-01-002">
  <title>PAINEL DE PRODUÇÃO — GALPÃO UNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Caveat:wght@500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">

    <!-- ===================== ÁREA CENTRAL =========================== -->
    <section class="board" id="board" aria-label="Cards em produção">
      <!-- cards completos injetados aqui via JS -->
    </section>

    <!-- ===================== COLUNA LATERAL ========================= -->
    <aside class="sidebar" id="sidebar" aria-label="Coluna lateral">
      <div class="sidebar-clock" id="refresh-stamp">--:--</div>
      <div class="sidebar-inner" id="sidebar-inner">
        <!-- cards reduzidos injetados aqui via JS -->
        <div class="sidebar-empty" id="sidebar-empty">AGUARDANDO RETIRADA</div>
      </div>
      <div class="sidebar-footer">
        <button class="btn-refresh" id="btn-refresh" title="Atualizar agora">↻</button>
        <button class="btn-theme"   id="btn-theme"   title="Alternar tema dia / noite">☾</button>
      </div>
    </aside>

    <!-- ===================== PAINEL DETALHE ========================= -->
    <section class="detail" id="detail" aria-label="Detalhe do trabalho selecionado">
      <div class="detail-frame">
        <div class="detail-content" id="detail-content">
          <!-- preenchido via JS no clique -->
        </div>
      </div>
    </section>

    <!-- ===================== TOAST de status ======================== -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- ===================== OVERLAY BORA ALMOÇAR ==================== -->
    <div class="lunch-overlay" id="lunch-overlay" hidden>
      <div class="lunch-text">BORA ALMOÇAR<br>KARAIII !!!!</div>
    </div>

    <!-- ===================== POPOVER DESPACHADOS RECENTES ============ -->
    <div class="dispatched-modal" id="dispatched-modal" hidden>
      <div class="dispatched-frame">
        <div class="dispatched-header">
          <span class="dispatched-title">DESPACHADOS · ÚLTIMOS 15</span>
          <button class="dispatched-close" id="dispatched-close" title="Fechar">×</button>
        </div>
        <div class="dispatched-list" id="dispatched-list"></div>
        <div class="dispatched-empty" id="dispatched-empty" hidden>
          Nenhum trabalho despachado ainda
        </div>
      </div>
    </div>

    <!-- ===================== MODAL NOTAS DO MOTORISTA =============== -->
    <div class="motorista-modal" id="motorista-modal" hidden>
      <div class="motorista-frame">
        <div class="motorista-header">
          <span class="motorista-title" id="motorista-title">NOTAS DO MOTORISTA</span>
          <button class="motorista-close" id="motorista-close" title="Fechar">×</button>
        </div>
        <div class="motorista-content"
             id="motorista-content"
             contenteditable="true"
             spellcheck="false"
             data-placeholder="COLE A INFORMAÇÃO AQUI · CTRL+V"></div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
