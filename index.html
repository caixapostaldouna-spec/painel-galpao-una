<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINEL DE PRODUÇÃO — GALPÃO UNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Caveat:wght@500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">

    <!-- ===================== TOPBAR ================================== -->
    <header class="topbar" id="topbar" aria-label="Resumo geral">
      <div class="stats" id="stats">
        <span class="stat stat-overdue"><strong id="stat-overdue">0</strong>ATRASADO</span>
        <span class="stat stat-urgent" ><strong id="stat-urgent" >0</strong>HOJE/AMANHÃ</span>
        <span class="stat stat-soon"   ><strong id="stat-soon"   >0</strong>NA SEMANA</span>
        <span class="stat stat-far"    ><strong id="stat-far"    >0</strong>FUTURO</span>
        <span class="stat stat-none"   ><strong id="stat-none"   >0</strong>SEM DATA</span>
        <span class="stat stat-ready"  ><strong id="stat-ready"  >0</strong>P/ RETIRAR</span>
      </div>
      <div class="topbar-right">
        <span class="refresh-stamp" id="refresh-stamp"></span>
        <button class="btn-refresh" id="btn-refresh" title="Atualizar agora (Ctrl+R atualiza tudo)">↻</button>
      </div>
    </header>

    <!-- ===================== ÁREA CENTRAL =========================== -->
    <section class="board" id="board" aria-label="Cards em produção">
      <!-- cards completos injetados aqui via JS -->
    </section>

    <!-- ===================== COLUNA LATERAL ========================= -->
    <aside class="sidebar" id="sidebar" aria-label="Cards em standby">
      <div class="sidebar-inner" id="sidebar-inner">
        <!-- cards reduzidos injetados aqui via JS -->
        <div class="sidebar-empty" id="sidebar-empty">AGUARDANDO RETIRADA</div>
      </div>
    </aside>

    <!-- ===================== PAINEL DETALHE ========================= -->
    <section class="detail" id="detail" aria-label="Detalhe do trabalho selecionado">
      <div class="detail-frame">
        <div class="detail-content" id="detail-content">
          <!-- preenchido via JS no clique -->
        </div>
      </div>
    </section>

    <!-- ===================== TOAST de status ======================== -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
